apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.rbac.registrationAdmin.clusterRoleName }}
  labels:
    app: kubecraft
    component: registration
rules:
# Create user namespaces
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["create", "get", "list"]
# Permissions needed to grant to users (required for binding roles)
- apiGroups: [ "" ]
  resources: [ "persistentvolumeclaims", "services" ]
  verbs: [ "get", "list", "create", "update", "delete" ]
- apiGroups: [ "" ]
  resources: [ "pods" ]
  verbs: [ "get", "list" ]
- apiGroups: [ "" ]
  resources: [ "pods/log" ]
  verbs: [ "get" ]
- apiGroups: [ "apps" ]
  resources: [ "statefulsets" ]
  verbs: [ "create", "get", "list", "patch", "update", "delete" ]
# Create user RBAC resources
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["create", "get"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles"]
  verbs: ["create", "get", "escalate"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["rolebindings"]
  verbs: ["create", "get", "bind"]
# Update the ClusterRoleBinding to add new users
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterrolebindings"]
  verbs: ["get", "update", "patch"]
  resourceNames: ["{{ .Values.rbac.capacityChecker.bindingName }}", "{{ .Values.rbac.registrationAdmin.bindingName }}"]
# Read required ClusterRoles for startup validation
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles"]
  verbs: ["get"]
  resourceNames: ["{{ .Values.rbac.capacityChecker.clusterRoleName }}", "{{ .Values.rbac.registrationAdmin.clusterRoleName }}"]
# Create resource quotas
- apiGroups: [""]
  resources: ["resourcequotas"]
  verbs: ["create", "get"]
# Generate ServiceAccount tokens
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  verbs: ["create"]
