name: Control Plane Validation

on:
  push:
    branches: [main]
    paths:
      - 'charts/kubecraft-control-plane/**'
      - '.github/workflows/test-manifests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'charts/kubecraft-control-plane/**'
      - '.github/workflows/test-manifests.yml'

jobs:
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint ./charts/kubecraft-control-plane

  helm-template-dry-run:
    name: Helm Template Dry Run
    runs-on: ubuntu-latest
    needs: helm-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Create k3d cluster
        uses: AbsaOSS/k3d-action@v2
        with:
          cluster-name: "helm-dry-run-cluster"
          args: >-
            --agents 1
            --no-lb
            --k3s-arg "--disable=traefik,servicelb,metrics-server@server:*"

      - name: Wait for cluster to be ready
        run: |
          kubectl wait --for=condition=Ready nodes --all --timeout=60s
          kubectl get nodes

      - name: Helm template dry-run
        run: |
          helm template kubecraft-control-plane ./charts/kubecraft-control-plane | kubectl apply --dry-run=client -f -
