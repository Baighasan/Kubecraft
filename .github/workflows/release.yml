name: Release

on:
  pull_request:
    types: [closed]

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && contains(github.event.pull_request.labels.*.name, 'release')
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine next version
        id: version
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $latest_tag"

          version=${latest_tag#v}
          major=$(echo "$version" | cut -d. -f1)
          minor=$(echo "$version" | cut -d. -f2)
          patch=$(echo "$version" | cut -d. -f3)

          labels='${{ toJson(github.event.pull_request.labels.*.name) }}'

          if echo "$labels" | grep -q '"semver:major"'; then
            major=$((major + 1))
            minor=0
            patch=0
            echo "Bumping major version"
          elif echo "$labels" | grep -q '"semver:minor"'; then
            minor=$((minor + 1))
            patch=0
            echo "Bumping minor version"
          else
            patch=$((patch + 1))
            echo "Bumping patch version"
          fi

          new_tag="v${major}.${minor}.${patch}"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "Next version: $new_tag"

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.new_tag }}" -m "Release ${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

      - name: Build CLI binaries
        env:
          PROD_ENDPOINT: ${{ vars.PROD_ENDPOINT }}
          PROD_NODE_ADDRESS: ${{ vars.PROD_NODE_ADDRESS }}
        run: |
          MODULE=github.com/baighasan/kubecraft/internal/config
          ENDPOINT="${PROD_ENDPOINT:-CHANGEME:6443}"
          NODE="${PROD_NODE_ADDRESS:-CHANGEME}"
          TAG="${{ steps.version.outputs.new_tag }}"
          LDFLAGS="-X ${MODULE}.ClusterEndpoint=${ENDPOINT} -X ${MODULE}.NodeAddress=${NODE} -X ${MODULE}.TLSInsecure=false -X ${MODULE}.ServerImage=ghcr.io/baighasan/kubecraft-minecraft:${TAG}"

          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/kubecraft-linux-amd64     ./cmd/kubecraft
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/kubecraft-linux-arm64     ./cmd/kubecraft
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/kubecraft-darwin-amd64    ./cmd/kubecraft
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/kubecraft-darwin-arm64    ./cmd/kubecraft
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/kubecraft-windows-amd64.exe ./cmd/kubecraft

          cd dist
          sha256sum kubecraft-* > checksums.txt
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: Release ${{ steps.version.outputs.new_tag }}
          generate_release_notes: true
          files: dist/*
