name: Build Minecraft Image

on:
  push:
    branches: ['*']
    tags: ['v*']
    paths:
      - 'docker/minecraft/**'
      - '.github/workflows/minecraft-image.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docker/minecraft/**'
      - '.github/workflows/minecraft-image.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/kubecraft-minecraft

jobs:
  build:
    name: Build Minecraft Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ !startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/minecraft/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "✅ Minecraft server image built successfully (not pushed — PR)"
          else
            echo "✅ Minecraft server image built and pushed:"
            echo "${{ steps.meta.outputs.tags }}"
          fi
