name: Integration Tests

on:
  push:
    branches: [main]
    paths:
      - 'internal/**'
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/test-integration.yml'
  pull_request:
    branches: [main]
    paths:
      - 'internal/**'
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Create k3d cluster
        uses: AbsaOSS/k3d-action@v2
        with:
          cluster-name: "test-cluster"
          args: >-
            --agents 1
            --no-lb
            --k3s-arg "--disable=traefik,servicelb,metrics-server@server:*"

      - name: Wait for cluster to be ready
        run: |
          kubectl wait --for=condition=Ready nodes --all --timeout=60s
          kubectl get nodes

      - name: Install control-plane (Helm)
        run: |
          helm upgrade --install kubecraft-control-plane ./charts/kubecraft-control-plane

      - name: Verify control-plane resources
        run: |
          kubectl cluster-info
          kubectl get clusterrole kc-capacity-checker
          kubectl get clusterrolebinding kc-users-capacity-check

      - name: Run integration tests
        run: |
          go test -v -race -p 1 -tags=integration -coverprofile=coverage.out \
            ./internal/config/... \
            ./internal/k8s/... \
            ./internal/registration/... \
            ./internal/cli

      - name: Display coverage
        if: success()
        run: |
          go tool cover -func=coverage.out

      - name: Upload coverage
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: integrationtests
          name: integration-tests
